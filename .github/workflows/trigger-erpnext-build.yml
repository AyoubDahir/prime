name: Trigger ERPNext Rebuild (prime)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/trigger-erpnext-build.yml'
      - '**/*.py'
      - '**/*.json'
      - '**/*.js'
      - '**/*.css'
      - '**/*.html'
      - '**/*.jinja'
      - '**/*.md'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger argocd build with Prime commit SHA
        run: |
          set -euo pipefail
          payload='{"event_type":"app-updated","client_payload":{"app":"prime","repo":"${{ github.repository }}","sha":"${{ github.sha }}"}}'
          status=$(curl -sS -o /tmp/dispatch-response.txt -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.ARGOCD_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/AyoubDahir/argocd/dispatches \
            -d "${payload}")
          if [ "${status}" != "204" ]; then
            echo "Dispatch failed with HTTP ${status}"
            cat /tmp/dispatch-response.txt || true
            exit 1
          fi
          echo "Triggered ERPNext rebuild (prime @ ${{ github.sha }}) with HTTP ${status}"
