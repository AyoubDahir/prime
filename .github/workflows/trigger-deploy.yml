name: Trigger UAT Deploy

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch build to argocd repo
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/AyoubDahir/argocd/dispatches \
            -d "{\"event_type\":\"prime-updated\",\"client_payload\":{\"sha\":\"${{ github.sha }}\"}}"
          echo "Dispatched prime-updated event (sha: ${{ github.sha }})"
